language: php

branches:
  only:
    - master

php:
  - 5.6
  - 7.0
  - 7.1
  - 7.2
  - 7.3

env:
  - WP_VERSION=latest WP_MULTISITE=0 APP_ENV=travis

cache:
  directories:
    - $HOME/.composer/cache

before_install:
  - source .travis/xdebug.sh
  - xdebug-disable
  - composer self-update
  - composer update
  - composer validate

before_script:
  - composer install
  - composer run setup-dev
  - bash bin/install-wp-tests.sh wordpress_test travis '' localhost $WP_VERSION

script:
  - cd $TRAVIS_BUILD_DIR
  - ./vendor/bin/phpunit
