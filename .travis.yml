language: php

branches:
  only:
    - master

php:
  # - 5.6
  # - 7.0
  # - 7.1
  # - 7.2
  - 7.3

env:
  - WP_VERSION=latest WP_MULTISITE=0 TEST_DB_NAME=wordpress_test TEST_DB_USER=travis TEST_DB_PASS=

cache:
  directories:
    - $HOME/.composer/cache

before_install:
  - source .travis/xdebug.sh
  - xdebug-disable
  - composer self-update
  - composer update
  - composer validate

before_script:
  - composer install
  - composer run setup-dev

script:
  - cd $TRAVIS_BUILD_DIR
  - ./vendor/bin/phpunit
