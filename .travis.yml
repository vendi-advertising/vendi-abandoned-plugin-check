language: php

branches:
  only:
    - master

php:
  - 5.3
  - 5.4
  - 5.5
  - 5.6
  - 7.0
  - 7.1
  - hhvm
  - nightly

env:
  - WP_VERSION=latest WP_MULTISITE=0

cache:
  directories:
    - $HOME/.composer/cache

before_install:
  - source .travis/xdebug.sh
  - xdebug-disable
  - composer self-update
  - composer validate

before_script:
  - |
    composer update
    composer install --dev
    bash bin/install-wp-tests.sh wordpress_test travis '' localhost $WP_VERSION

script:
  - cd $TRAVIS_BUILD_DIR
  - ./vendor/bin/phpunit
